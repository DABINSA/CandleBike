<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2c48"/><stop offset="1" stop-color="#090d15"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5d6c"/><stop offset="1" stop-color="#e11d36"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#1fc6a8"/><stop offset="1" stop-color="#46f0cf"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- 캔들 (배경 악센트) -->
  <g opacity="0.9">
    <rect x="86"  y="300" width="20" height="92" rx="6" fill="#2ec27e"/>
    <rect x="150" y="250" width="20" height="80" rx="6" fill="#2ec27e"/>
    <rect x="350" y="214" width="20" height="78" rx="6" fill="#ff5d6c"/>
  </g>

  <!-- 네온 차트(코스) — 오르막 -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M64 360 L168 336 L256 372 L356 252 L452 196" stroke="url(#teal)" stroke-width="34" opacity="0.35" filter="url(#glow)"/>
    <path d="M64 360 L168 336 L256 372 L356 252 L452 196" stroke="url(#teal)" stroke-width="22"/>
  </g>

  <!-- 스포츠 바이크 실루엣 (오르막을 오르는 자세) -->
  <g transform="translate(252 286) rotate(-9)">
    <!-- 뒷바퀴 -->
    <circle cx="-96" cy="40" r="58" fill="#0c1117"/>
    <circle cx="-96" cy="40" r="58" fill="none" stroke="#e6f0f0" stroke-width="9"/>
    <circle cx="-96" cy="40" r="9" fill="#e6f0f0"/>
    <!-- 앞바퀴 -->
    <circle cx="104" cy="40" r="58" fill="#0c1117"/>
    <circle cx="104" cy="40" r="58" fill="none" stroke="#e6f0f0" stroke-width="9"/>
    <circle cx="104" cy="40" r="9" fill="#e6f0f0"/>
    <!-- 스윙암 / 포크 -->
    <path d="M-96 40 L-8 6 M104 40 L46 -34" stroke="#39485c" stroke-width="13" stroke-linecap="round"/>
    <!-- 바디(탱크+시트+카울) -->
    <path d="M-104 14
             Q-92 -22 -54 -22
             L-10 -22
             Q24 -58 78 -34
             L116 -14
             Q130 -6 120 12
             L70 8
             Q40 18 -8 16
             Z" fill="url(#red)"/>
    <!-- 카울 하이라이트 -->
    <path d="M-8 -18 Q24 -50 74 -30" fill="none" stroke="#ffd9de" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
    <!-- 윈드스크린 -->
    <path d="M84 -32 Q108 -36 112 -16 L96 -14 Z" fill="#46f0cf"/>
  </g>
</svg>
