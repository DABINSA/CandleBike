<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- OG 미리보기 원본. 수정 후 PNG 재생성:
       npx -y sharp-cli -i assets/og.svg -o assets -f png  (그 후 생성된 파일을 og.png 로) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1828"/>
      <stop offset="1" stop-color="#070a10"/>
    </linearGradient>
    <linearGradient id="under" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2ce6c4" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2ce6c4" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g stroke="#2ce6c4" stroke-opacity="0.06" stroke-width="1">
    <path d="M0 160H1200M0 320H1200M0 480H1200M200 0V630M400 0V630M600 0V630M800 0V630M1000 0V630"/>
  </g>

  <path d="M0 470 L150 430 L260 480 L360 360 L470 410 L560 300 L680 360 L800 250 L920 330 L1050 220 L1200 280 L1200 630 L0 630 Z" fill="url(#under)"/>
  <path d="M0 470 L150 430 L260 480 L360 360 L470 410 L560 300 L680 360 L800 250 L920 330 L1050 220 L1200 280"
        fill="none" stroke="#2ce6c4" stroke-width="5" stroke-linejoin="round" filter="url(#glow)"/>

  <g transform="translate(556 268)" filter="url(#glow)">
    <circle cx="-34" cy="22" r="20" fill="#0c1117" stroke="#2ce6c4" stroke-width="3"/>
    <circle cx="34" cy="22" r="20" fill="#0c1117" stroke="#2ce6c4" stroke-width="3"/>
    <path d="M-40 12 L-12 6 Q4 -10 22 -4 L36 0 Q46 2 44 12 L-12 14 Z" fill="#39f0d4"/>
    <circle cx="6" cy="-22" r="9" fill="#eef3f7"/>
    <rect x="0" y="-16" width="6" height="3" rx="1.5" fill="#2ce6c4"/>
  </g>

  <text x="80" y="150" font-family="Pretendard, Apple SD Gothic Neo, Segoe UI, sans-serif" font-size="76" font-weight="900" fill="#e6f0f0">📈🏍️ CandleBike</text>
  <text x="82" y="220" font-family="Pretendard, Segoe UI, sans-serif" font-size="40" font-weight="800" fill="#2ce6c4">캔들바이크 · 차트를 달려라</text>
  <text x="80" y="560" font-family="Pretendard, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#9fb0bd">검색한 주식의 3년 차트가 코스! 변동성을 버티고 순위에 도전</text>
</svg>
