name: traffic-watch

# 무료 한도에 닿기 "전에" 미리 알림 — 트래픽(방문자) 임계 감시.
# 하루 1번 /api/admin/stats 를 읽어 DAU/MAU 가 임계를 넘으면 중앙 Relay 로 POST → 같은 텔레그램 방.
# 임계 돌파 시 1회만 알림(상태는 actions/cache 로 보존), 다시 내려가면 재무장(스팸 방지).
#
# 필요한 GitHub Secret:
#   ADMIN_TOKEN  — Vercel 환경변수 ADMIN_TOKEN 과 동일 값(읽기전용 통계 토큰. service_role 아님)
# 시크릿이 없거나 엔드포인트가 미구성(503)이면 조용히 스킵(알림 안 함).
on:
  schedule:
    - cron: '0 23 * * *'        # 매일 08:00 KST (전날치 집계가 마감된 시점)
  workflow_dispatch:

env:
  STATS_URL: https://candlebike.vercel.app/api/admin/stats
  RELAY_URL: https://primary-production-956de.up.railway.app/webhook/service-alert
  SERVICE_NAME: CandleRider
  DAU_THRESHOLD: '1500'         # 어제 방문자 ≥ 이 값이면 경고(무료 편안한계 ~2~3k의 한참 전)
  MAU_THRESHOLD: '30000'        # 최근 30일 방문자 ≥ 이 값이면 경고(무료 한계 ~5만의 한참 전)

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: tw-state
          key: tw-state-${{ github.run_id }}
          restore-keys: |
            tw-state-

      - name: Check & alert
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          mkdir -p tw-state
          alerted=$(cat tw-state/alerted 2>/dev/null || echo 0)

          if [ -z "$ADMIN_TOKEN" ]; then
            echo "ADMIN_TOKEN secret not set — skipping (no alert)."; exit 0
          fi

          resp=$(curl -s -m 25 -w $'\n%{http_code}' -H "Authorization: Bearer $ADMIN_TOKEN" "$STATS_URL" || echo $'\n000')
          code=$(printf '%s' "$resp" | tail -n1)
          body=$(printf '%s' "$resp" | sed '$d')
          echo "HTTP $code (prev alerted=$alerted)"
          if [ "$code" != "200" ]; then
            echo "stats endpoint not 200 — skipping. body: $body"; exit 0
          fi

          # 어제(마지막 '완료된' 날) DAU = daily 배열의 끝에서 2번째, MAU = last30
          dau=$(printf '%s' "$body" | jq -r '.visitors.daily[-2].visitors // 0')
          mau=$(printf '%s' "$body" | jq -r '.visitors.last30 // 0')
          wau=$(printf '%s' "$body" | jq -r '.visitors.last7 // 0')
          echo "DAU(yesterday)=$dau  WAU=$wau  MAU=$mau  (DAU_TH=$DAU_THRESHOLD MAU_TH=$MAU_THRESHOLD)"

          over=0
          [ "$dau" -ge "$DAU_THRESHOLD" ] 2>/dev/null && over=1
          [ "$mau" -ge "$MAU_THRESHOLD" ] 2>/dev/null && over=1

          if [ "$over" = "1" ]; then
            if [ "$alerted" != "1" ]; then
              reason="📈 트래픽 임계 돌파 — 어제 방문자(DAU) ${dau}명 / 최근30일(MAU) ${mau}명. 무료 한도에 접근 중이니 유료 전환(Vercel Pro)을 검토하세요."
              detail="기준: DAU≥${DAU_THRESHOLD} 또는 MAU≥${MAU_THRESHOLD} · 최근7일(WAU) ${wau}명"
              printf '{"service":"%s","reason":"%s","detail":"%s"}' "$SERVICE_NAME" "$reason" "$detail" > payload.json
              curl -s -H 'Content-Type: application/json' --data-binary @payload.json "$RELAY_URL" || true
              echo "ALERT sent."
              echo 1 > tw-state/alerted
            else
              echo "Already alerted — skip (debounced)."
            fi
          else
            # 임계 아래로 내려오면 재무장(다음에 다시 넘으면 또 알림)
            echo 0 > tw-state/alerted
          fi

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: tw-state
          key: tw-state-${{ github.run_id }}
