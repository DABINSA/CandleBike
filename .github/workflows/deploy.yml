name: deploy-vercel

# main에 push되면 Vercel 프로덕션으로 자동 배포.
# 필요한 시크릿: VERCEL_TOKEN (repo Settings → Secrets and variables → Actions)
# org/project ID는 비밀이 아니라 아래 env에 둠.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_JlUQUCJ7BYrKRhAJMimrIhSq
  VERCEL_PROJECT_ID: prj_fj1YS73qYzbb0DdUJiv9nW2TS1jR

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy (prebuilt) to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
